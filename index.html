<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jon Knox — Photographs</title>

<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page">
    <header class="site-header">
      <div class="header-inner">
        <div class="header-left">
          PHOTOGRAPHS 2006 - 2026
        </div>

        <div class="header-center">
          JON KNOX
        </div>

        <nav class="header-right">
          <a href="#info">INFO</a>

        </nav>
      </div>
    </header>


  <div class="archive-head">
    <div class="section-label">Archive</div>
  </div>

  <div class="archive-grid">

    <!-- CALIFORNIA -->
    <article class="item">
      <div class="gallery">
        <div class="gallery-track">
          <div class="slide" data-index="0">
            <div class="frame">
              <img src="images/mom2.jpg" alt="California" loading="lazy" decoding="async" />
            </div>
          </div>

          <div class="slide" data-index="1">
            <div class="frame">
              <img src="images/hillsmorgan.jpg" alt="California hills" loading="lazy" decoding="async" />
            </div>
          </div>

          <div class="slide" data-index="2">
            <div class="frame">
              <img src="images/madrone.jpg" alt="California candle" loading="lazy" decoding="async" />
            </div>
          </div>

          <div class="slide" data-index="3">
            <div class="frame">
              <img src="images/momcandle.jpg" alt="California madrone" loading="lazy" decoding="async" />
            </div>
          </div>

          <div class="slide" data-index="4">
            <div class="frame">
              <img src="images/trailer.jpg" alt="California trailer" loading="lazy" decoding="async" />
            </div>
          </div>
        </div>

        <div class="caption">
          <span class="cap-title">California</span>
          <span class="cap-meta">Document</span>
        </div>
      </div>
    </article>

    <!-- NEW YORK -->
    <article class="item">
      <div class="gallery">
        <div class="gallery-track">
          <div class="slide" data-index="0">
            <div class="frame">
              <img src="images/bikekid2.jpg" alt="Bike Kid" loading="lazy" decoding="async" />
            </div>
          </div>

          <div class="slide" data-index="1">
            <div class="frame">
              <img src="images/priest.jpg" alt="Priest" loading="lazy" decoding="async" />
            </div>
          </div>

          <div class="slide" data-index="2">
            <div class="frame">
              <img src="images/yoga.jpg" alt="Yoga" loading="lazy" decoding="async" />
            </div>
          </div>
        </div>

        <div class="caption">
          <span class="cap-title">New York</span>
          <span class="cap-meta">Street</span>
        </div>
      </div>
    </article>

    <!-- EDITO -->
    <article class="item">
      <div class="gallery">
        <div class="gallery-track">
          <div class="slide" data-index="0">
            <div class="frame">
              <img src="images/ella2.jpg" alt="Greece" loading="lazy" decoding="async" />
            </div>
          </div>
        
          <div class="slide" data-index="1">
            <div class="frame">
              <img src="studio/alice.jpg" alt="Alice" loading="lazy" decoding="async" />
            </div>
          </div>

          <div class="slide" data-index="2">
            <div class="frame">
              <img src="studio/storm.jpg" alt="Storm" loading="lazy" decoding="async" />
            </div>
          </div>

        <div class="slide" data-index="3">
            <div class="frame">
              <img src="studio/chio2.jpg" alt="Chiomato" loading="lazy" decoding="async" />
            </div>
          </div>


          <div class="slide" data-index="4">
            <div class="frame">
              <img src="studio/kai.jpg" alt="Kai" loading="lazy" decoding="async" />
            </div>
          </div>
        </div>

        <div class="caption">
          <span class="cap-title">Edito</span>
        </div>
      </div>
    </article>

    <!-- NATURAL WORLD -->
  <article class="item">
  <div class="gallery">
    <div class="gallery-track">

      <div class="slide" data-index="0">
        <div class="frame">
          <img src="natural world/croatia.jpg" alt="Croatia" loading="eager" decoding="async" />
        </div>
      </div>

      <!-- SUNFLOWER (IMG 2) -->
      <div class="slide" data-index="1">
        <div class="frame">
          <img src="images/sunflower.jpg" alt="Sunflower" loading="eager" decoding="async" />
        </div>
      </div>

      <div class="slide" data-index="2">
        <div class="frame">
          <img src="natural world/maewen.jpg" alt="Maewen" loading="lazy" decoding="async" />
        </div>
      </div>

      <div class="slide" data-index="3">
        <div class="frame">
          <img src="natural world/brothers.jpg" alt="Brothers" loading="lazy" decoding="async" />
        </div>
      </div>

      <div class="slide" data-index="4">
        <div class="frame">
          <img src="natural world/brendan2.jpg" alt="Brendan" loading="lazy" decoding="async" />
        </div>
      </div>

      <div class="slide" data-index="5">
        <div class="frame">
          <img src="natural world/Steven.jpg" alt="Steven" loading="lazy" decoding="async" />
        </div>
      </div>

      <div class="slide" data-index="6">
        <div class="frame">
          <img src="natural world/yuba.jpg" alt="Yuba" loading="lazy" decoding="async" />
        </div>
      </div>

    </div>

    <div class="caption">
      <span class="cap-title">Nature</span>
    </div>
  </div>
</article>

    <section id="info" class="info">
      <div>
        <div class="section-label">Info</div>
        <p>Documentary, cultural heritage, and archive-driven photography presented with a quiet editorial rhythm.</p>
      </div>

      <div>
        <a class="contact-link" href="mailto:studio@jonknoxphoto.com">studio@jonknoxphoto.com</a>
      </div>
    </section>

    <footer id="contact" class="footer">
      <span>Jon Knox — Photographs</span>
    </footer>
  </div>

  <script src="gallery.js"></script>
</body>
</html>
