<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jon Knox — Photographs</title>

  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      background: #f2f1ec;
      color: #111;
      font-family: Arial, Helvetica, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .page {
      max-width: 1120px;
      margin: 0 auto;
      padding: 18px 22px 42px;
      overflow-x: hidden;
    }

    h1.title {
      margin: 0;
      font-size: clamp(24px, 3.2vw, 40px);
      font-weight: 300;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .archive-grid {
      display: grid;
      gap: 26px;
    }

    /* GALLERY */
    .gallery {
      width: 100%;
      overflow: hidden;
      position: relative;
      touch-action: pan-y;
    }

    .gallery-track {
      display: flex;
      gap: 20px;
      will-change: transform;
    }

    .gallery .slide {
      flex: 0 0 100%;
      min-width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .gallery .frame {
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* DESKTOP IMAGE */
    .gallery .frame img {
      display: block;
      width: auto;
      height: 70vh;
      max-width: 100%;
      max-height: 70vh;
      object-fit: contain;
    }

    /* CAPTION */
    .gallery .caption {
      display: flex;
      flex-direction: column;
      width: min(100%, 860px);
      margin-top: 8px;
      text-align: left;
    }

    /* ---------------- MOBILE FIX ---------------- */
    @media (max-width: 480px) {
      .page {
        padding: 18px 14px 42px;
        overflow-x: hidden;
      }

      .archive-grid {
        display: block;
        width: 100%;
      }

      .gallery {
        width: 100%;
      }

      .gallery-track {
        gap: 0;
        width: 100%;
      }

      .gallery .slide {
        flex: 0 0 100%;
        min-width: 100%;
        width: 100%;
      }

      .gallery .frame {
        width: 100%;
        overflow: hidden;
      }

      /* 🔑 THIS IS THE REAL FIX */
      .gallery .frame img {
        width: 100%;
        height: auto;
        max-width: 100%;
        max-height: 78vh;
        object-fit: contain;
      }

      .gallery .caption {
        width: 100%;
        font-size: 9px;
      }
    }
  </style>
</head>

<body>
  <div class="page">

    <h1 class="title">Jon Knox</h1>

    <section id="archive">
      <div class="archive-grid">

        <article class="item">
          <div class="gallery">
            <div class="gallery-track">

              <div class="slide">
                <div class="frame">
                  <img src="images/mom2.jpg" />
                </div>
                <div class="caption">
                  <span>California</span>
                  <span>Document</span>
                </div>
              </div>

              <div class="slide">
                <div class="frame">
                  <img src="images/hillsmorgan.jpg" />
                </div>
                <div class="caption">
                  <span>California</span>
                  <span>Document</span>
                </div>
              </div>

            </div>
          </div>
        </article>

      </div>
    </section>

  </div>

  <script src="gallery.js"></script>
</body>
</html>
